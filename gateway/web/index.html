<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quake Cloud Stream</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a1a;
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        h1 { margin: 1rem 0; color: #ff6600; }
        #status {
            padding: 0.5rem 1rem;
            margin-bottom: 1rem;
            border-radius: 4px;
            font-size: 0.9rem;
        }
        .connected { background: #1b4332; color: #95d5b2; }
        .disconnected { background: #4a1a1a; color: #f08080; }
        .connecting { background: #3a2e00; color: #ffd166; }
        #video-container {
            position: relative;
            width: 640px;
            height: 400px;
            background: #000;
            border: 2px solid #333;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        #controls {
            margin-top: 1rem;
            display: flex;
            gap: 1rem;
        }
        button {
            padding: 0.5rem 1.5rem;
            background: #333;
            color: #e0e0e0;
            border: 1px solid #555;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
        }
        button:hover { background: #444; }
        button:disabled { opacity: 0.5; cursor: default; }
        #log {
            margin-top: 1rem;
            width: 640px;
            height: 150px;
            background: #111;
            border: 1px solid #333;
            overflow-y: auto;
            padding: 0.5rem;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>
<body>
    <h1>Quake Cloud Stream</h1>
    <div id="status" class="disconnected">Disconnected</div>
    <div id="video-container">
        <video id="remote-video" autoplay playsinline></video>
    </div>
    <div id="controls">
        <button id="btn-connect">Connect</button>
        <button id="btn-disconnect" disabled>Disconnect</button>
        <button id="btn-fullscreen">Fullscreen</button>
    </div>
    <div id="log"></div>

    <script>
    "use strict";

    const statusEl = document.getElementById("status");
    const videoEl = document.getElementById("remote-video");
    const logEl = document.getElementById("log");
    const btnConnect = document.getElementById("btn-connect");
    const btnDisconnect = document.getElementById("btn-disconnect");
    const btnFullscreen = document.getElementById("btn-fullscreen");

    let pc = null;
    let dc = null; // data channel for input

    function log(msg) {
        const ts = new Date().toISOString().slice(11, 23);
        logEl.textContent += `[${ts}] ${msg}\n`;
        logEl.scrollTop = logEl.scrollHeight;
    }

    function setStatus(text, cls) {
        statusEl.textContent = text;
        statusEl.className = cls;
    }

    async function connect() {
        setStatus("Connecting…", "connecting");
        log("Creating RTCPeerConnection");

        pc = new RTCPeerConnection({
            iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
        });

        pc.onicecandidate = (e) => {
            if (e.candidate) {
                log("Sending ICE candidate");
                fetch("/ws/signaling", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ type: "candidate", candidate: e.candidate.candidate })
                });
            }
        };

        pc.ontrack = (e) => {
            log("Received remote track: " + e.track.kind);
            if (e.streams && e.streams[0]) {
                videoEl.srcObject = e.streams[0];
            }
        };

        pc.onconnectionstatechange = () => {
            log("Connection state: " + pc.connectionState);
            if (pc.connectionState === "connected") {
                setStatus("Connected", "connected");
            } else if (pc.connectionState === "failed" || pc.connectionState === "disconnected") {
                setStatus("Disconnected", "disconnected");
            }
        };

        // Data channel for sending input to the game worker
        dc = pc.createDataChannel("input", { ordered: true });
        dc.onopen = () => log("Input data channel open");
        dc.onclose = () => log("Input data channel closed");

        // Add receive-only transceivers for audio and video
        pc.addTransceiver("video", { direction: "recvonly" });
        pc.addTransceiver("audio", { direction: "recvonly" });

        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);

        log("Sending SDP offer");
        const resp = await fetch("/ws/signaling", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ type: "offer", sdp: offer.sdp })
        });

        const answer = await resp.json();
        if (answer.sdp) {
            await pc.setRemoteDescription(new RTCSessionDescription(answer));
            log("Remote description set");
        }

        btnConnect.disabled = true;
        btnDisconnect.disabled = false;
    }

    function disconnect() {
        if (dc) { dc.close(); dc = null; }
        if (pc) { pc.close(); pc = null; }
        videoEl.srcObject = null;
        setStatus("Disconnected", "disconnected");
        btnConnect.disabled = false;
        btnDisconnect.disabled = true;
        log("Disconnected");
    }

    // Keyboard input forwarding
    document.addEventListener("keydown", (e) => {
        if (dc && dc.readyState === "open") {
            dc.send(JSON.stringify({ type: "key", key: e.keyCode, down: true }));
        }
    });
    document.addEventListener("keyup", (e) => {
        if (dc && dc.readyState === "open") {
            dc.send(JSON.stringify({ type: "key", key: e.keyCode, down: false }));
        }
    });

    // Mouse input forwarding
    videoEl.addEventListener("mousemove", (e) => {
        if (dc && dc.readyState === "open") {
            dc.send(JSON.stringify({ type: "mouse", dx: e.movementX, dy: e.movementY, buttons: e.buttons }));
        }
    });

    videoEl.addEventListener("click", () => {
        videoEl.requestPointerLock();
    });

    btnConnect.addEventListener("click", connect);
    btnDisconnect.addEventListener("click", disconnect);
    btnFullscreen.addEventListener("click", () => {
        const container = document.getElementById("video-container");
        if (container.requestFullscreen) container.requestFullscreen();
    });

    log("Quake Cloud Stream client ready");
    </script>
</body>
</html>
