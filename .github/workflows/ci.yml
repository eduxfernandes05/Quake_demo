name: CI — Build & Smoke Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-linux:
    name: Linux (${{ matrix.compiler }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc
            cc: gcc
          - compiler: clang
            cc: clang

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake
          if [ "${{ matrix.cc }}" = "clang" ]; then
            sudo apt-get install -y clang
          fi

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=${{ matrix.cc }}

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Smoke Tests
        run: ctest --test-dir build --output-on-failure --timeout 10

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: quake-linux-${{ matrix.compiler }}
          path: |
            build/QW/server/qwsv
            build/WinQuake/quake-dedicated
