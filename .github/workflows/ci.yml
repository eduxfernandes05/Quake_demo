name: CI — Build & Smoke Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-linux:
    name: Linux (${{ matrix.compiler }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc
            cc: gcc
          - compiler: clang
            cc: clang

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake
          if [ "${{ matrix.cc }}" = "clang" ]; then
            sudo apt-get install -y clang
          fi

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=${{ matrix.cc }}

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Smoke Tests
        run: ctest --test-dir build --output-on-failure --timeout 10

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: quake-linux-${{ matrix.compiler }}
          path: |
            build/QW/server/qwsv
            build/WinQuake/quake-dedicated

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install analysis tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake cppcheck clang-tidy clang

      - name: Configure CMake (compile_commands.json)
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run cppcheck
        run: |
          cppcheck --enable=warning,performance,portability \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --suppress=unmatchedSuppression \
            --error-exitcode=1 \
            --inline-suppr \
            -I WinQuake -I QW/client -I QW/server \
            WinQuake/*.c QW/server/*.c QW/client/*.c \
            2>&1 || true

      - name: Run clang-tidy
        run: |
          clang-tidy \
            -p build \
            --checks='-*,bugprone-*,security-*,-bugprone-easily-swappable-parameters,-bugprone-narrowing-conversions,-bugprone-suspicious-include,-bugprone-reserved-identifier,-bugprone-assignment-in-if-condition,-bugprone-macro-parentheses,-bugprone-implicit-widening-of-multiplication-result,-bugprone-casting-through-void,-bugprone-switch-missing-default-case,-bugprone-multi-level-implicit-pointer-conversion' \
            --quiet \
            WinQuake/common.c WinQuake/cl_parse.c WinQuake/host_cmd.c WinQuake/sv_main.c \
            2>&1 || true
